    <script>
      // ==========================================
      // HTML / option building helpers
      // ==========================================
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function buildSheetOptions(sheetNames, activeSheet) {
        return sheetNames
          .map((name) => {
            const escaped = escapeHtml(name);
            const selected = name === activeSheet ? " selected" : "";
            return `<option value="${escaped}"${selected}>${escaped}</option>`;
          })
          .join("");
      }

      function buildColumnOptions(cols) {
        let html = '<option value="--">— none —</option>';
        for (const col of cols) {
          if (col !== "") {
            const escaped = escapeHtml(col);
            html += `<option value="${escaped}">${escaped}</option>`;
          }
        }
        return html;
      }

      function normalizeHeader(str) {
        return str
          .toLowerCase()
          .trim()
          .replace(/[\s_\-./]+/g, "");
      }

      function editDistance(a, b) {
        if (a === b) return 0;
        if (a.length === 0) return b.length;
        if (b.length === 0) return a.length;
        if (a.length > b.length) [a, b] = [b, a];
        let prev = Array.from({ length: a.length + 1 }, (_, i) => i);
        let curr = new Array(a.length + 1);
        for (let j = 1; j <= b.length; j++) {
          curr[0] = j;
          for (let i = 1; i <= a.length; i++) {
            curr[i] = a[i - 1] === b[j - 1] ? prev[i - 1] : 1 + Math.min(prev[i - 1], prev[i], curr[i - 1]);
          }
          [prev, curr] = [curr, prev];
        }
        return prev[a.length];
      }

      function fuzzyThreshold(len) {
        if (len < 5) return 0;
        if (len <= 7) return 1;
        return 2;
      }

      function fuzzyMatchField(normalized, aliasMap) {
        const max = fuzzyThreshold(normalized.length);
        if (max === 0) return null;
        let bestDistance = max + 1;
        let bestField = null;
        for (const aliasKey of Object.keys(aliasMap)) {
          if (Math.abs(aliasKey.length - normalized.length) > max) continue;
          const d = editDistance(normalized, aliasKey);
          if (d < bestDistance) {
            bestDistance = d;
            bestField = aliasMap[aliasKey];
          }
        }
        return bestField;
      }

      function computeAutomap(headers, learnedAliases = {}) {
        const automap = {};
        for (const header of headers) {
          if (!header) continue;
          const key = normalizeHeader(header);
          const fieldId = learnedAliases[key] || AUTO_MAP_ALIASES[key] || fuzzyMatchField(key, learnedAliases) || fuzzyMatchField(key, AUTO_MAP_ALIASES);
          if (fieldId && !automap[fieldId]) {
            automap[fieldId] = header;
          }
        }
        return automap;
      }

      // ==========================================
      // Validation helpers
      // ==========================================
      const MINIMUM_INPUTS = [
        ["latitude", "longitude"],
        ["street_address", "city", "region", "postal_code", "iso_country_code"],
        ["street_address", "region", "postal_code", "iso_country_code"],
        ["street_address", "city", "region", "iso_country_code"],
      ];

      function minimumInputProvided(columnMappings) {
        const mapped = Object.keys(columnMappings).filter((key) => columnMappings[key] !== "--");
        return MINIMUM_INPUTS.some((inputs) => inputs.every((key) => mapped.includes(key)));
      }

      function hasDuplicateMappings(columnMappings) {
        const mapped = Object.values(columnMappings).filter((v) => v !== "--");
        return new Set(mapped).size !== mapped.length;
      }

      // ==========================================
      // State management
      // ==========================================

      function currentMappings() {
        const m = {};
        for (const sel of document.getElementsByClassName("selectCols")) {
          m[sel.id] = sel.value;
        }
        return m;
      }

      function duplicateColumns(mappings) {
        const counts = {};
        for (const val of Object.values(mappings)) {
          if (!val || val === "--") continue;
          counts[val] = (counts[val] || 0) + 1;
        }
        return new Set(Object.keys(counts).filter((col) => counts[col] > 1));
      }

      function updateFieldStates() {
        const mappings = currentMappings();
        const dups = duplicateColumns(mappings);

        for (const sel of document.getElementsByClassName("selectCols")) {
          const wrap = sel.closest(".field");
          if (!wrap) continue;
          const mapped = sel.value && sel.value !== "--";
          let state = "unmapped";
          if (mapped && dups.has(sel.value)) {
            state = "conflict";
          } else if (mapped) {
            state = "mapped";
          }
          wrap.dataset.state = state;
        }
      }

      function computeStatus(mappings) {
        const mapped = Object.keys(mappings).filter((k) => mappings[k] !== "--");
        const labels = {
          latitude: "Lat",
          longitude: "Lng",
          street_address: "street",
          city: "city",
          region: "region",
          postal_code: "postal",
          iso_country_code: "country",
        };

        if (duplicateColumns(mappings).size > 0) {
          return { kind: "conflict", text: "Duplicate column mapping" };
        }
        // Check each minimum set
        for (const set of MINIMUM_INPUTS) {
          if (set.every((k) => mapped.includes(k))) {
            return { kind: "ready", text: "✓ Ready" };
          }
        }
        // Not yet satisfied — compute the smallest gap
        let smallestGap = Infinity;
        let gapLabel = "";
        for (const set of MINIMUM_INPUTS) {
          const missing = set.filter((k) => !mapped.includes(k));
          if (missing.length < smallestGap) {
            smallestGap = missing.length;
            gapLabel = missing.map((k) => labels[k] || k).join(", ");
          }
        }
        if (smallestGap === Infinity) return { kind: "none", text: "Map columns to begin" };
        if (mapped.length === 0) return { kind: "none", text: "Map columns to begin" };
        if (smallestGap === 1) return { kind: "partial", text: `Need ${gapLabel}` };
        return { kind: "partial", text: `${smallestGap} more fields needed` };
      }

      function updateStatusChip() {
        const mappings = currentMappings();
        const status = computeStatus(mappings);
        const chip = document.getElementById("mappingStatus");
        const text = document.getElementById("mappingStatusText");
        chip.className = "status-chip status-chip--" + status.kind;
        text.textContent = status.text;

        const btn = document.getElementById("generate");
        const canGenerate = status.kind === "ready";
        btn.setAttribute("aria-disabled", String(!canGenerate));
        btn.title = canGenerate ? "Generate Placekeys" : status.text;
      }

      function updateBadgeCounts() {
        const returns = Array.from(document.getElementsByClassName("returnFields")).filter((i) => i.checked).length;
        const retBadge = document.getElementById("returnCount");
        retBadge.textContent = returns;
        retBadge.classList.toggle("disclosure__badge--active", returns > 0);
      }

      // ==========================================
      // Preferences auto-save (user-level, cross-sheet)
      // ==========================================
      let savePrefsTimer = null;
      function savePrefsDebounced() {
        if (savePrefsTimer) clearTimeout(savePrefsTimer);
        savePrefsTimer = setTimeout(() => {
          const requestFields = Array.from(document.getElementsByClassName("returnFields"))
            .filter((i) => i.checked)
            .map((i) => i.name);
          const insertError = document.getElementById("insertError").checked;
          google.script.run.withFailureHandler((err) => console.log("savePrefs", err)).saveUserPrefs({ requestFields, insertError });
        }, 400);
      }

      function applyUserPrefs(userPrefs) {
        if (!userPrefs) return;
        if (Array.isArray(userPrefs.requestFields)) {
          for (const cb of document.getElementsByClassName("returnFields")) {
            cb.checked = userPrefs.requestFields.includes(cb.name);
          }
        }
        if (typeof userPrefs.insertError === "boolean") {
          document.getElementById("insertError").checked = userPrefs.insertError;
        }
      }

      function refreshUI() {
        updateFieldStates();
        updateStatusChip();
        updateBadgeCounts();
      }

      function attachFieldListeners() {
        for (const sel of document.getElementsByClassName("selectCols")) {
          sel.addEventListener("change", refreshUI);
        }
        for (const cb of document.getElementsByClassName("returnFields")) {
          cb.addEventListener("change", () => {
            updateBadgeCounts();
            savePrefsDebounced();
          });
        }
        const insertErr = document.getElementById("insertError");
        if (insertErr) insertErr.addEventListener("change", savePrefsDebounced);
      }

      // ==========================================
      // Initialization
      // ==========================================
      document.addEventListener("DOMContentLoaded", () => {
        google.script.run.withSuccessHandler(handleSheetData).getSheets();
      });

      function handleSheetData(e) {
        document.getElementById("stillWorking").classList.add("hidden");
        document.getElementById("sheets").innerHTML = buildSheetOptions(e[1], e[0]);
        updateColumns(e[2]);
        attachFieldListeners();
      }

      function changeSheet() {
        const selectedSheet = document.getElementById("sheets").value;
        google.script.run.withSuccessHandler(updateColumns).changeSheet(selectedSheet);
      }

      function updateColumns({ cols, mapData, learnedAliases, userPrefs } = { cols: false, mapData: {}, learnedAliases: {}, userPrefs: {} }) {
        if (!mapData) mapData = {};
        if (!learnedAliases) learnedAliases = {};
        const emptyEl = document.getElementById("emptySheet");
        const mapEl = document.getElementById("mapTitle");
        if (!cols) {
          emptyEl.classList.remove("hidden");
          mapEl.classList.add("hidden");
          return;
        }
        emptyEl.classList.add("hidden");
        mapEl.classList.remove("hidden");

        const headers = cols[0];
        const columnsHtml = buildColumnOptions(headers);
        const automap = computeAutomap(headers, learnedAliases);

        for (const sel of document.getElementsByClassName("selectCols")) {
          sel.innerHTML = columnsHtml;
          const fieldId = sel.id;
          const saved = mapData[fieldId];
          const savedIsValid = saved && saved !== "--" && headers.includes(saved);
          let value = "--";
          if (savedIsValid) {
            value = saved;
          } else if (automap[fieldId]) {
            value = automap[fieldId];
          }
          sel.value = value;
        }

        applyUserPrefs(userPrefs);
        refreshUI();
      }

      // ==========================================
      // Generate flow
      // ==========================================
      let statusInterval;

      function generateKeys() {
        const generateBtn = document.getElementById("generate");
        const toast = document.getElementById("generateToast");

        if (generateBtn.getAttribute("aria-disabled") === "true") {
          setToast(computeStatus(currentMappings()).text, "error");
          return false;
        }

        const mappings = currentMappings();
        if (hasDuplicateMappings(mappings)) {
          setToast("The same column is mapped to more than one field.", "error");
          return false;
        }

        generateBtn.disabled = true;

        const requestFields = Array.from(document.getElementsByClassName("returnFields"))
          .filter((i) => i.checked)
          .map((i) => i.name);

        setToast("Working...");

        const config = {
          columnMappings: mappings,
          requestFields,
          options: {
            addressMatch: false,
            nameMatch: false,
            overwrite: true,
            insertError: document.getElementById("insertError").checked,
          },
        };

        window.key = crypto.randomUUID() + "." + Date.now();

        google.script.run.withFailureHandler(failedAPI).withSuccessHandler(generateKeysToast).generateKeys(config, window.key);

        if (statusInterval) clearInterval(statusInterval);
        statusInterval = setInterval(() => {
          google.script.run
            .withFailureHandler((err) => console.log("status", err))
            .withSuccessHandler(showCurrentStatus)
            .getStatus(window.key);
        }, 2000);
      }

      function setToast(message, kind) {
        const toast = document.getElementById("generateToast");
        toast.textContent = message || "";
        toast.className = "toast" + (kind ? " toast--" + kind : "");
      }

      function showCurrentStatus(e) {
        const status = e ?? "Loading...";
        if (window.key && status) {
          setToast(status);
          if (status.indexOf("Done!") !== -1) {
            setToast(status, "success");
            clearInterval(statusInterval);
            window.key = null;
          }
        }
      }

      function failedAPI(e) {
        setToast(e && e.message ? e.message : "Something went wrong.", "error");
        document.getElementById("generate").disabled = false;
        if (statusInterval) {
          clearInterval(statusInterval);
          window.key = null;
        }
      }

      function generateKeysToast(count) {
        setToast(`Done! Generated ${count} Placekeys.`, "success");
        document.getElementById("generate").disabled = false;
        if (statusInterval) {
          clearInterval(statusInterval);
          window.key = null;
        }
      }

      function insertSample() {
        google.script.run.withSuccessHandler(updateColumns).insertSample();
      }

      function refreshUpdateSheet() {
        const select = document.getElementById("sheets");
        select.disabled = true;
        google.script.run.withSuccessHandler(handleRefreshData).refreshUpdateSheet();
      }

      function handleRefreshData(e) {
        const select = document.getElementById("sheets");
        select.disabled = false;
        select.innerHTML = buildSheetOptions(e[1], e[0]);
        updateColumns(e[2]);
      }
    </script>
  </body>
</html>
