name: Deploy

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  deploy:
    name: Deploy to Google Sheets
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - run: npm install

      - name: Configure clasp credentials
        run: |
          echo '${{ secrets.CLASP_JSON }}' > .clasp.json
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to Apps Script
        run: npx clasp push --force

      - name: Create versioned deployment
        run: npx clasp deploy --description "Release ${{ github.ref_name }}"
