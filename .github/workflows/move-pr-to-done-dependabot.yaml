name: Move pr to done dependabot

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions: {}

jobs:
  move-pr-to-done-dependabot:
    permissions:
      repository-projects: write
    secrets:
      PROJECT_RW_TOKEN: ${{ secrets.PLACEKEY_GITHUB_PROJECT_RW_TOKEN }}
    uses: senzing-factory/build-resources/.github/workflows/move-pr-to-done-dependabot.yaml@5054409094ee8f157395df086da166a898bbe1e9 # v4
    with:
      project: ${{ vars.PLACEKEY_PROJECT_PLACEKEY }}
