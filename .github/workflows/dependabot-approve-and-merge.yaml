name: Dependabot approve and merge

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependabot-approve-and-merge:
    permissions:
      contents: write
      pull-requests: write
    secrets:
      CODEOWNER_PR_RW_TOKEN: ${{ secrets.PLACEKEY_GITHUB_CODEOWNER_PR_RW_TOKEN }}
    uses: senzing-factory/build-resources/.github/workflows/dependabot-approve-and-merge.yaml@5054409094ee8f157395df086da166a898bbe1e9 # v4
