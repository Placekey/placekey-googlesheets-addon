name: Spellcheck

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  spellcheck:
    permissions:
      contents: read
    uses: senzing-factory/build-resources/.github/workflows/cspell.yaml@5054409094ee8f157395df086da166a898bbe1e9 # v4
